<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор карточек монстров D&D</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .controls {
            background: rgba(30, 30, 46, 0.9);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            border: 2px solid #444;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .control-group label {
            color: #ffcc00;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        .control-group select,
        .control-group input {
            background: rgba(40, 40, 60, 0.8);
            border: 1px solid #555;
            color: #fff;
            padding: 8px 12px;
            border-radius: 5px;
            min-width: 200px;
        }
        
        button {
            background: linear-gradient(to right, #cc3300, #ff6600);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .generator-btn {
            background: linear-gradient(to right, #0066cc, #0099ff);
            margin-left: auto;
        }
        
        .monster-card-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(600px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        
        .monster-card {
            background: rgba(30, 30, 46, 0.9);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 2px solid #444;
            display: flex;
            flex-direction: column;
        }
        
        .card-header {
            padding: 20px;
            background: rgba(20, 20, 35, 0.8);
            border-bottom: 2px solid #333;
        }
        
        .monster-name {
            font-size: 2rem;
            color: #ff9900;
            margin-bottom: 5px;
            text-shadow: 0 0 5px rgba(255, 153, 0, 0.3);
        }
        
        .monster-type {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 15px;
            font-style: italic;
        }
        
        .card-body {
            display: flex;
            flex-wrap: wrap;
            flex: 1;
        }
        
        .image-section {
            flex: 1;
            min-width: 250px;
            padding: 20px;
            background: rgba(20, 20, 35, 0.6);
        }
        
        .monster-image {
            width: 100%;
            height: 250px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            border: 3px solid #555;
        }
        
        .monster-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        
        .stat-box {
            background: rgba(40, 40, 60, 0.8);
            border-radius: 8px;
            padding: 10px 5px;
            text-align: center;
            border: 1px solid #555;
        }
        
        .stat-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffcc00;
        }
        
        .stat-name {
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .content-section {
            flex: 2;
            min-width: 300px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .section-title {
            font-size: 1.4rem;
            color: #ffcc00;
            margin-bottom: 12px;
            padding-bottom: 5px;
            border-bottom: 2px solid #555;
            display: flex;
            align-items: center;
        }
        
        .section-title i {
            margin-right: 8px;
        }
        
        .characteristics {
            margin-bottom: 20px;
        }
        
        .char-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        
        .char-item {
            background: rgba(50, 50, 70, 0.5);
            padding: 10px 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            border-left: 4px solid #555;
        }
        
        .char-item:nth-child(odd) {
            border-left-color: #ff9900;
        }
        
        .char-name {
            font-weight: bold;
            color: #ccc;
            font-size: 0.9rem;
        }
        
        .char-value {
            color: #ffcc00;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        .abilities, .actions, .items, .patterns {
            margin-bottom: 20px;
        }
        
        .ability-list, .action-list, .item-list, .pattern-list {
            list-style-type: none;
        }
        
        .ability-item, .action-item, .item-item, .pattern-item {
            background: rgba(40, 40, 60, 0.5);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 4px solid #777;
        }
        
        .ability-title, .action-title, .item-title, .pattern-title {
            color: #ffcc00;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 1rem;
        }
        
        .ability-desc, .action-desc, .item-desc, .pattern-desc {
            color: #ccc;
            line-height: 1.4;
            font-size: 0.9rem;
        }
        
        .action-item {
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .action-item:hover {
            background: rgba(60, 60, 90, 0.7);
        }
        
        .dice-roll {
            background: rgba(255, 204, 0, 0.1);
            padding: 5px 10px;
            border-radius: 4px;
            margin-top: 5px;
            border-left: 3px solid #ffcc00;
        }
        
        .cr-badge {
            display: inline-block;
            background: linear-gradient(to right, #cc3300, #ff6600);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 10px;
        }
        
        .footer {
            text-align: center;
            padding: 15px;
            color: #777;
            font-size: 0.8rem;
            border-top: 1px solid #333;
            background: rgba(20, 20, 35, 0.8);
        }
        
        @media (max-width: 700px) {
            .monster-card-container {
                grid-template-columns: 1fr;
            }
            
            .card-body {
                flex-direction: column;
            }
            
            .image-section {
                border-right: none;
                border-bottom: 2px solid #333;
            }
        }
        
        @media (max-width: 500px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .char-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Генератор карточек монстров D&D</h1>
            <p>Загрузите JSON файл с данными монстра или выберите из списка</p>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label for="monsterSelect">Выберите монстра:</label>
                <select id="monsterSelect">
                    <option value="">-- Выберите --</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="jsonFile">Или загрузите JSON:</label>
                <input type="file" id="jsonFile" accept=".json">
            </div>
            
            <button id="generateBtn" class="generator-btn">Сгенерировать карточку</button>
        </div>
        
        <div class="monster-card-container" id="cardContainer">
            <!-- Карточки будут добавляться сюда -->
        </div>
    </div>

    <script>
        class MonsterCardGenerator {
            constructor() {
                this.cardContainer = document.getElementById('cardContainer');
                this.monsterSelect = document.getElementById('monsterSelect');
                this.jsonFileInput = document.getElementById('jsonFile');
                this.generateBtn = document.getElementById('generateBtn');
                
                this.sampleMonsters = {
                    'evil_paladin': this.getSamplePaladin(),
                    'dragon': this.getSampleDragon(),
                    'lich': this.getSampleLich()
                };
                
                this.init();
            }
            
            init() {
                // Заполняем выпадающий список
                for (const [id, monster] of Object.entries(this.sampleMonsters)) {
                    const option = document.createElement('option');
                    option.value = id;
                    option.textContent = monster.name;
                    this.monsterSelect.appendChild(option);
                }
                
                // События
                this.generateBtn.addEventListener('click', () => this.generateCard());
                this.jsonFileInput.addEventListener('change', (e) => this.loadJsonFile(e));
                
                // Автогенерация примера
                this.generateCardFromData(this.sampleMonsters.evil_paladin);
            }
            
            loadJsonFile(event) {
                const file = event.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const monsterData = JSON.parse(e.target.result);
                        this.generateCardFromData(monsterData);
                    } catch (error) {
                        alert('Ошибка загрузки JSON файла: ' + error.message);
                    }
                };
                reader.readAsText(file);
            }
            
            generateCard() {
                const selectedId = this.monsterSelect.value;
                if (selectedId && this.sampleMonsters[selectedId]) {
                    this.generateCardFromData(this.sampleMonsters[selectedId]);
                } else {
                    alert('Выберите монстра из списка или загрузите JSON файл');
                }
            }
            
            generateCardFromData(monsterData) {
                const card = this.createMonsterCard(monsterData);
                this.cardContainer.insertBefore(card, this.cardContainer.firstChild);
            }
            
            createMonsterCard(data) {
                // Основной контейнер карточки
                const card = document.createElement('div');
                card.className = 'monster-card';
                
                // Рассчитываем модификаторы характеристик
                const stats = this.calculateStats(data);
                
                // Генерация HTML
                card.innerHTML = `
                    <div class="card-header">
                        <h2 class="monster-name">${data.name}</h2>
                        <div class="monster-type">${data.type}, ${data.alignment}</div>
                        ${data.challenge_rating ? `<span class="cr-badge">Опасность: ${data.challenge_rating}</span>` : ''}
                    </div>
                    
                    <div class="card-body">
                        <div class="image-section">
                            <div class="monster-image">
                                <img src="${data.image || 'https://via.placeholder.com/300x250/2d3748/4a5568?text=No+Image'}" alt="${data.name}">
                            </div>
                            
                            <div class="stats-grid">
                                ${this.generateStatsHTML(stats)}
                            </div>
                        </div>
                        
                        <div class="content-section">
                            ${data.patterns ? this.generatePatternsHTML(data.patterns) : ''}
                            
                            <div class="characteristics">
                                <h3 class="section-title"><i class="fas fa-chart-bar"></i> Характеристики</h3>
                                <div class="char-list">
                                    ${this.generateCharacteristicsHTML(data, stats)}
                                </div>
                            </div>
                            
                            ${data.abilities ? this.generateAbilitiesHTML(data.abilities) : ''}
                            
                            ${data.actions ? this.generateActionsHTML(data.actions, stats, data.proficiency_bonus || 0) : ''}
                            
                            ${data.items ? this.generateItemsHTML(data.items) : ''}
                        </div>
                    </div>
                    
                    <div class="footer">
                        <p>${data.lore || 'Создано генератором монстров'}</p>
                    </div>
                `;
                
                // Добавляем обработчики для бросков кубиков
                this.addDiceRollListeners(card, data.actions, stats, data.proficiency_bonus || 0);
                
                return card;
            }
            
            calculateStats(data) {
                const stats = {};
                const statNames = ['strength', 'dexterity', 'constitution', 'intelligence', 'wisdom', 'charisma'];
                
                statNames.forEach(stat => {
                    if (data[stat]) {
                        stats[stat] = {
                            value: data[stat],
                            modifier: Math.floor((data[stat] - 10) / 2)
                        };
                    }
                });
                
                return stats;
            }
            
            generateStatsHTML(stats) {
                const statLabels = {
                    strength: 'Сила',
                    dexterity: 'Ловкость',
                    constitution: 'Телосложение',
                    intelligence: 'Интеллект',
                    wisdom: 'Мудрость',
                    charisma: 'Харизма'
                };
                
                return Object.entries(stats).map(([stat, info]) => `
                    <div class="stat-box">
                        <div class="stat-value">${info.value}(${info.modifier >= 0 ? '+' : ''}${info.modifier})</div>
                        <div class="stat-name">${statLabels[stat]}</div>
                    </div>
                `).join('');
            }
            
            generatePatternsHTML(patterns) {
                return `
                    <div class="patterns">
                        <h3 class="section-title"><i class="fas fa-robot"></i> Паттерны поведения</h3>
                        <ul class="pattern-list">
                            ${patterns.map((pattern, i) => `
                                <li class="pattern-item">
                                    <div class="pattern-title">Паттерн ${i}</div>
                                    <div class="pattern-desc">${pattern}</div>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            }
            
            generateCharacteristicsHTML(data, stats) {
                const characteristics = [
                    { name: 'Класс Доспеха', value: data.armor_class || 'Не указан' },
                    { name: 'Хиты', value: `${data.hit_points || 0} (${data.hit_dice || 'Не указано'})` },
                    { name: 'Скорость', value: data.speed || 'Не указана' },
                    { name: 'Чувства', value: data.senses || 'Не указаны' },
                    { name: 'Спасброски', value: this.formatSavingThrows(data.saving_throws, stats) },
                    { name: 'Навыки', value: this.formatSkills(data.skills) },
                    { name: 'Иммунитеты', value: data.damage_immunities || 'Нет' },
                    { name: 'Языки', value: data.languages || 'Не указаны' }
                ];
                
                return characteristics.map(char => `
                    <div class="char-item">
                        <span class="char-name">${char.name}:</span>
                        <span class="char-value">${char.value}</span>
                    </div>
                `).join('');
            }
            
            formatSavingThrows(savingThrows, stats) {
                if (!savingThrows) return 'Нет';
                
                return savingThrows.map(throwData => {
                    const stat = throwData.stat.toLowerCase();
                    const modifier = stats[stat] ? stats[stat].modifier : 0;
                    const bonus = throwData.bonus || 0;
                    return `${throwData.stat} ${bonus >= 0 ? '+' : ''}${bonus}`;
                }).join(', ');
            }
            
            formatSkills(skills) {
                if (!skills) return 'Нет';
                
                return skills.map(skill => `${skill.name} +${skill.bonus}`).join(', ');
            }
            
            generateAbilitiesHTML(abilities) {
                return `
                    <div class="abilities">
                        <h3 class="section-title"><i class="fas fa-fire"></i> Способности</h3>
                        <ul class="ability-list">
                            ${abilities.map(ability => `
                                <li class="ability-item">
                                    <div class="ability-title">${ability.name}</div>
                                    <div class="ability-desc">${ability.description}</div>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            }
            
            generateActionsHTML(actions, stats, proficiencyBonus) {
                return `
                    <div class="actions">
                        <h3 class="section-title"><i class="fas fa-fist-raised"></i> Действия</h3>
                        <ul class="action-list" id="actions-list">
                            ${actions.map(action => {
                                const attackBonus = this.calculateAttackBonus(action, stats, proficiencyBonus);
                                const damageBonus = this.calculateDamageBonus(action, stats);
                                return `
                                    <li class="action-item" data-action='${JSON.stringify(action)}'>
                                        <div class="action-title">${action.name}</div>
                                        <div class="action-desc">
                                            ${attackBonus ? `+${attackBonus} к попаданию, ` : ''}
                                            ${action.range || ''}
                                            ${action.damage_dice ? `, урон: ${action.damage_dice} ${damageBonus >= 0 ? '+' : ''}${damageBonus} ${action.damage_type || ''}` : ''}
                                            ${action.description ? `<br>${action.description}` : ''}
                                        </div>
                                        <div class="dice-roll" style="display: none;"></div>
                                    </li>
                                `;
                            }).join('')}
                        </ul>
                    </div>
                `;
            }
            
            calculateAttackBonus(action, stats, proficiencyBonus) {
                if (!action.attack_bonus) {
                    // Авторасчет на основе характеристики
                    const ability = action.ability?.toLowerCase();
                    if (ability && stats[ability]) {
                        return stats[ability].modifier + proficiencyBonus;
                    }
                }
                return action.attack_bonus || 0;
            }
            
            calculateDamageBonus(action, stats) {
                if (!action.damage_bonus && action.damage_ability) {
                    const ability = action.damage_ability.toLowerCase();
                    if (stats[ability]) {
                        return stats[ability].modifier;
                    }
                }
                return action.damage_bonus || 0;
            }
            
            generateItemsHTML(items) {
                return `
                    <div class="items">
                        <h3 class="section-title"><i class="fas fa-gem"></i> Сокровища и предметы</h3>
                        <ul class="item-list">
                            ${items.map(item => `
                                <li class="item-item">
                                    <div class="item-title">${item.name}</div>
                                    <div class="item-desc">${item.description}</div>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            }
            
            addDiceRollListeners(card, actions, stats, proficiencyBonus) {
                const actionItems = card.querySelectorAll('.action-item');
                
                actionItems.forEach((item, index) => {
                    if (index < actions.length) {
                        const action = actions[index];
                        item.addEventListener('click', () => {
                            this.rollAttackAndDamage(action, stats, proficiencyBonus, item);
                        });
                    }
                });
            }
            
            rollAttackAndDamage(action, stats, proficiencyBonus, element) {
                const diceRollDiv = element.querySelector('.dice-roll');
                
                // Бросок атаки
                let attackRoll = '';
                if (action.attack_bonus || action.ability) {
                    const d20 = Math.floor(Math.random() * 20) + 1;
                    const attackBonus = this.calculateAttackBonus(action, stats, proficiencyBonus);
                    const total = d20 + attackBonus;
                    
                    attackRoll = `Атака: ${d20} + ${attackBonus} = ${total}`;
                    if (d20 === 20) attackRoll += ' ⚡КРИТ!';
                    if (d20 === 1) attackRoll += ' 💥ПРОВАЛ!';
                }
                
                // Бросок урона
                let damageRoll = '';
                if (action.damage_dice) {
                    const damageDice = action.damage_dice;
                    const diceMatch = damageDice.match(/(\d+)d(\d+)/);
                    
                    if (diceMatch) {
                        const numDice = parseInt(diceMatch[1]);
                        const diceType = parseInt(diceMatch[2]);
                        const damageBonus = this.calculateDamageBonus(action, stats);
                        
                        let totalDamage = damageBonus;
                        let rolls = [];
                        
                        for (let i = 0; i < numDice; i++) {
                            const roll = Math.floor(Math.random() * diceType) + 1;
                            rolls.push(roll);
                            totalDamage += roll;
                        }
                        
                        damageRoll = `Урон: ${rolls.join(' + ')}`;
                        if (damageBonus !== 0) {
                            damageRoll += ` + ${damageBonus}`;
                        }
                        damageRoll += ` = ${totalDamage} ${action.damage_type || ''}`;
                    }
                }
                
                // Показываем результат
                diceRollDiv.innerHTML = `${attackRoll}${attackRoll && damageRoll ? '<br>' : ''}${damageRoll}`;
                diceRollDiv.style.display = 'block';
                
                // Автоскрытие через 10 секунд
                setTimeout(() => {
                    diceRollDiv.style.display = 'none';
                }, 10000);
            }
            
            getSamplePaladin() {
                return {
                    "name": "Загадочный рыцарь",
                    "type": "Человек",
                    "alignment": "законно-злой",
                    "challenge_rating": 8,
                    "armor_class": 20,
                    "hit_points": 150,
                    "hit_dice": "15d10+60",
                    "speed": "35 фт.",
                    "senses": "Слепозрение 60 фт.",
                    "strength": 20,
                    "dexterity": 20,
                    "constitution": 20,
                    "intelligence": 16,
                    "wisdom": 18,
                    "charisma": 10,
                    "proficiency_bonus": 4,
                    "saving_throws": [
                        {"stat": "Ловкость", "bonus": 4},
                        {"stat": "Сила", "bonus": 4},
                        {"stat": "Телосложение", "bonus": 4}
                    ],
                    "skills": [
                        {"name": "Внимательность", "bonus": 8},
                        {"name": "Атлетика", "bonus": 9},
                        {"name": "Акробатика", "bonus": 9}
                    ],
                    "damage_immunities": "усыпление, очарование",
                    "languages": "Общий",
                    "patterns": [
                        "Если кто-то крадется использует Готовность для атаки рекацией",
                        "Если принцессу захватывают то магически меняется с ней, используя прием Подмена",
                        "Совершает двойную атаку, с провоцированием и бонусным действием кидает меч",
                        "Бонусным действием притягивает меч, двойная атака",
                        "Парирует при атаке"
                    ],
                    "abilities": [
                        {
                            "name": "Парирование",
                            "description": "Если другое существо причиняет вам урон рукопашной атакой, вы можете реакцией потратить одну кость превосходства, чтобы уменьшить урон на величину, равную броску вашей кости превосходства + ваш модификатор Ловкости."
                        },
                        {
                            "name": "Провоцирующая атака",
                            "description": "Если вы попадаете по существу атакой оружием, вы можете потратить одну кость превосходства, чтобы попытаться спровоцировать противника атаковать вас."
